# OpenTelemetry Collector - Windows to Coralogix
# Sends host metrics from a Windows machine to Coralogix

receivers:
  hostmetrics:
    collection_interval: 30s
    scrapers:
      cpu: {}
      disk: {}
      process:
        mute_process_all_errors: true
      memory: {}
      network: {}
      filesystem: {}
      paging: {}
      # Note: load average is not supported on Windows

processors:
  batch:
    timeout: 10s
    send_batch_size: 1024
  resource:
    attributes:
      - key: deployment.environment.name
        value: "local-windows"
        action: upsert
      - key: cx_application_name
        value: "${env:CX_APPLICATION_NAME}"
        action: upsert

exporters:
  coralogix:
    domain: "eu2.coralogix.com"
    private_key: "${env:CORALOGIX_PRIVATE_KEY}"
    application_name: "${env:CX_APPLICATION_NAME}"
    subsystem_name: "host-metrics"
    timeout: 30s
  debug:
    verbosity: basic
    sampling_initial: 2
    sampling_thereafter: 10

service:
  telemetry:
    logs:
      level: warn
  pipelines:
    metrics:
      receivers: [hostmetrics]
      processors: [resource, batch]
      exporters: [coralogix, debug]
